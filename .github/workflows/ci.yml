name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

jobs:
  ci:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Pin npm version
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  e2e:
    name: E2E tests (staging)
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/staging' && contains(github.event.head_commit.message, '[e2e]')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Pin npm version
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Seed E2E test data
        run: npx tsx playwright/global-setup.ts
        env:
          E2E_DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
          PLAYWRIGHT_BASE_URL: https://photos-staging.radomski.co.nz

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: https://photos-staging.radomski.co.nz

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
