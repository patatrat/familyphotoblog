version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      all-dependencies:
        patterns:
          - "*"
    ignore:
      # next-auth peer-depends on nodemailer ^7; ignore major bumps until next-auth supports v8
      - dependency-name: "nodemailer"
        update-types: ["version-update:semver-major"]
      # Major version bumps for these tools break the build; pin to current major
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      all-dependencies:
        patterns:
          - "*"
