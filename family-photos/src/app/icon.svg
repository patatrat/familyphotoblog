<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <clipPath id="photo-area">
      <rect x="5" y="5" width="22" height="22" rx="1.5"/>
    </clipPath>
  </defs>

  <!-- Frame -->
  <rect x="1" y="1" width="30" height="30" rx="4" fill="#7C5230"/>
  <rect x="3" y="3" width="26" height="26" rx="3" fill="#9B6B40"/>

  <!-- Photo (sky + landscape, clipped to inner rect) -->
  <g clip-path="url(#photo-area)">
    <!-- Sky -->
    <rect x="5" y="5" width="22" height="22" fill="#5AADDE"/>
    <!-- Sun -->
    <circle cx="22" cy="10" r="3.5" fill="#FFD84D"/>
    <!-- Back hill -->
    <ellipse cx="11" cy="27" rx="13" ry="8" fill="#5CA64B"/>
    <!-- Front hill -->
    <ellipse cx="22" cy="29" rx="13" ry="8" fill="#4A8F3A"/>
    <!-- Ground strip -->
    <rect x="5" y="24" width="22" height="3" fill="#3D7A2F"/>
  </g>

  <!-- Frame border over the photo edge -->
  <rect x="5" y="5" width="22" height="22" rx="1.5" fill="none" stroke="#7C5230" stroke-width="0.5"/>
</svg>
